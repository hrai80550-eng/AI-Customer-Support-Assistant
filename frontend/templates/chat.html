<!DOCTYPE html>
<html>
<head>
    <title>AI Customer Support Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="brand-icon">🤖</span> AI Support Bot
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin">Admin Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/analytics">Analytics</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/intents">Intents</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/responses">Responses</a></li>
                                <li class="nav-item"><a class="nav-link" href="/admin/messages">Messages</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container chat-page-wrap">
    <div class="chat-wrapper">
        <div class="card shadow chat-card">
            <div class="card-header chat-header">
                <div class="header-content">
                    <span class="status-dot"></span>
                    <h3>AI Customer Support Assistant</h3>
                </div>
                <p class="header-subtitle">We're online and ready to help</p>
            </div>
            <div class="card-body chat-body">
                <div id="chat-box"></div>
            </div>
            <div class="card-footer chat-footer">
                <div class="input-group">
                    <input
                        type="text"
                        id="user-input"
                        class="form-control chat-input"
                        placeholder="Type your message..."
                        onkeypress="if(event.key==='Enter') sendMessage()">
                    <button
                        class="btn send-btn"
                        onclick="sendMessage()">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
